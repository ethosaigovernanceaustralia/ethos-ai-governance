<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - Ethos AI Governance</title>
  <link rel="stylesheet" href="portal.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="login-page">

  <a href="/" class="login-logo">
    <img src="../assets/logo-icon.svg" alt="Ethos"/>
    <span class="login-logo-wordmark">
      <span class="login-logo-brand">ETHOS</span>
      <span class="login-logo-tagline">AI Governance</span>
    </span>
  </a>

  <div class="login-card">
    <div class="login-card-header">
      <h1 class="login-card-title">Set New Password</h1>
      <p class="login-card-sub">Choose a strong password for your account.</p>
    </div>

    <div class="auth-error" id="authError" style="display:none">
      <span class="material-symbols-outlined" style="font-size:1.1rem">error</span>
      <span id="authErrorMsg">Something went wrong.</span>
    </div>

    <div class="auth-success" id="authSuccess" style="display:none">
      <span class="material-symbols-outlined" style="font-size:1.1rem">check_circle</span>
      <span id="authSuccessMsg">Password updated! Redirecting to sign in…</span>
    </div>

    <form id="resetForm" novalidate>
      <div class="p-form-group">
        <label class="p-label" for="newPassword">New Password</label>
        <input class="p-input" type="password" id="newPassword" placeholder="Min. 8 characters" required autocomplete="new-password"/>
      </div>
      <div class="p-form-group">
        <label class="p-label" for="confirmPassword">Confirm Password</label>
        <input class="p-input" type="password" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn-gold btn-gold-full" id="resetBtn" style="margin-top:0.5rem">
        Save Password
        <span class="material-symbols-outlined" style="font-size:1rem">check</span>
      </button>
    </form>

    <a href="/portal/login" class="forgot-link">Back to sign in</a>
  </div>

  <p class="login-tagline">Secure document exchange for Ethos clients</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="portal.js"></script>
<script>
(async () => {
  const sb = getSupabase();

  if (!sb) {
    document.getElementById('authErrorMsg').textContent = 'Portal not configured.';
    document.getElementById('authError').style.display = 'flex';
    document.getElementById('resetForm').style.display = 'none';
    return;
  }

  // Supabase v2 fires PASSWORD_RECOVERY when the reset link token is detected.
  // We wait for that event before allowing the form to be used.
  let recoveryReady = false;

  sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true;
    }
  });

  // Give the SDK a moment to process the hash token
  await new Promise(r => setTimeout(r, 500));

  // If no recovery session arrived, the link is invalid/expired
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('authErrorMsg').textContent =
      'This password reset link is invalid or has expired. Please request a new one.';
    document.getElementById('authError').style.display = 'flex';
    document.getElementById('resetForm').style.display = 'none';
    return;
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const newPassword   = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn  = document.getElementById('resetBtn');
    const errEl = document.getElementById('authError');

    errEl.style.display = 'none';

    if (newPassword.length < 8) {
      document.getElementById('authErrorMsg').textContent = 'Password must be at least 8 characters.';
      errEl.style.display = 'flex';
      return;
    }

    if (newPassword !== confirmPassword) {
      document.getElementById('authErrorMsg').textContent = 'Passwords do not match.';
      errEl.style.display = 'flex';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving…';

    const { error } = await sb.auth.updateUser({ password: newPassword });

    if (error) {
      document.getElementById('authErrorMsg').textContent = error.message;
      errEl.style.display = 'flex';
      btn.disabled = false;
      btn.innerHTML = 'Save Password <span class="material-symbols-outlined" style="font-size:1rem">check</span>';
      return;
    }

    document.getElementById('authSuccess').style.display = 'flex';
    document.getElementById('resetForm').style.display = 'none';

    setTimeout(() => { window.location.href = '/portal/login'; }, 2500);
  });
})();
</script>
</body>
</html>
